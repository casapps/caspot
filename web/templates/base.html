{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - caspot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0e27;
            color: #e0e6ed;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: #151a35;
            padding: 20px 0;
            border-bottom: 1px solid #2d3561;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #4fc3f7;
            font-size: 24px;
        }

        .nav {
            margin-top: 10px;
        }

        .nav a {
            color: #8892b0;
            text-decoration: none;
            padding: 8px 16px;
            margin-right: 10px;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .nav a:hover {
            background: #1e2749;
            color: #4fc3f7;
        }

        .card {
            background: #151a35;
            border: 1px solid #2d3561;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card h2 {
            color: #4fc3f7;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #8892b0;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            background: #0a0e27;
            border: 1px solid #2d3561;
            border-radius: 4px;
            color: #e0e6ed;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        .btn {
            background: #4fc3f7;
            color: #0a0e27;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #29b6f6;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .alert {
            padding: 12px 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid #f44336;
            color: #f44336;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid #4caf50;
            color: #4caf50;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1e2749;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #2d3561;
        }

        .stat-card h3 {
            color: #8892b0;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .value {
            color: #4fc3f7;
            font-size: 32px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: #1e2749;
            padding: 12px;
            text-align: left;
            color: #8892b0;
            font-weight: 600;
            border-bottom: 2px solid #2d3561;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #2d3561;
        }

        table tr:hover {
            background: rgba(79, 195, 247, 0.05);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .badge-danger {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .badge-warning {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
        }

        .badge-info {
            background: rgba(79, 195, 247, 0.2);
            color: #4fc3f7;
        }
    </style>
</head>
<body>
    {{template "content" .}}
</body>
</html>
{{end}}
